
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
</head>
<body>

    <h2>Notes App</h2>

    <!-- Title Input -->
    <input 
        type="text" 
        id="note-title" 
        placeholder="Enter note title"
    >

    <!-- Content Input -->
    <textarea 
        id="note-content" 
        placeholder="Write your note here"
    ></textarea>

    <!-- Buttons -->
    <button id="save-btn">Save</button>

    <!-- Notes Container -->
    <ul id="notes-list"></ul>

</body>
</html>
